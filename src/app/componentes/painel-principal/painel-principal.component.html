<main>
    <section class="section-products">
        <h1>Lista de produtos</h1>
        <mat-grid-list cols="3" rowHeight="550px" gutterSize="25px">
            <mat-grid-tile *ngFor="let produto of produtos">
                <mat-card class="card">
                    <a routerLink="/atualizar-produto/{{produto.id}}"><img mat-card-image [src]="produto.foto"
                            [alt]="produto.titulo"></a>
                    <mat-card-header>
                        <mat-card-title>{{produto.titulo}}</mat-card-title>
                    </mat-card-header>
                    <mat-card-content>
                        <p>{{produto.descricao}}</p>
                    </mat-card-content>
                    <span class="span-price">{{ formatarPreco(produto.preco) }}</span>
                    <mat-card-actions>
                        <button mat-button routerLink="/atualizar-produto/{{produto.id}}">Editar</button>
                        <button mat-button (click)="abrirConfirmaExcluir(produto.id)">Excluir</button>
                    </mat-card-actions>
                </mat-card>
            </mat-grid-tile>

        </mat-grid-list>
    </section>
</main>
